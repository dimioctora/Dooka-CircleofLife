server {
    listen 80;
    server_name dooka.id www.dooka.id;
    return 301 https://dooka.id$request_uri;
}

server {
    listen 443 ssl;
    server_name dooka.id;
    root /var/www/dooka.id/public;
    client_max_body_size 100M;

    index index.php index.html index.htm;

    # Circle of Life Frontend (Static React Build)
    location /circle-graph {
        alias /var/www/circle-of-life/frontend/dist;
        index index.html;
        try_files $uri $uri/ /circle-graph/index.html;
    }

    # Circle of Life API
    location /api-circle/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }

    ssl_certificate /etc/letsencrypt/live/dooka.id/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dooka.id/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
